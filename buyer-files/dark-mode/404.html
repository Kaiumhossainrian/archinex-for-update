<!doctype html>
<html lang="en">
  <head>
    <!-- required meta -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- #favicon -->
    <link
      rel="shortcut icon"
      href="assets/images/favicon.webp"
      type="image/x-icon"
    />
    <link rel="icon" href="assets/images/favicon.webp" type="image/x-icon" />
    <!-- #title -->
    <title>
      Archinex | Modern Architecture & Interior Design HTML Template
    </title>
    <!-- #keywords -->
    <meta
      name="keywords"
      content="architecture, interior, creative, modern, luxury, html, bootstrap, scss"
    />
    <!-- #description -->
    <meta
      name="description"
      content="Modern Architecture & Interior Design HTML Template"
    />
    <!-- bootstrap five css -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <!-- font awesome six css -->
    <link rel="stylesheet" href="assets/fonts/css/all.min.css" />
    <!-- tabler icons css -->
    <link rel="stylesheet" href="assets/fonts/css/tabler-icons.min.css" />
    <!-- magnific popup css -->
    <link rel="stylesheet" href="assets/css/magnific-popup.css" />
    <!-- nice select css -->
    <link rel="stylesheet" href="assets/css/nice-select.css" />
    <!-- odometer css -->
    <link rel="stylesheet" href="assets/css/odometer.css" />
    <!-- swiper slider css -->
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css" />
    <!-- main css -->
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body class="dark-mode">
    <!--[if lt IE 9]>
      <p class="browserupgrade">
        You are using an <strong>outdated</strong> browser. Please
        <a href="https://browsehappy.com/">upgrade your browser</a> to improve
        your experience and security.
      </p>
    <![endif]-->
    <div class="page-wrapper">
      <!-- ==== preloader start ==== -->
      <div class="preloader">
        <div class="preloader-inner">
          <div class="preloader-logo">
            <span>LOADING</span>
          </div>
          <div class="preloader-bar">
            <div class="preloader-progress"></div>
          </div>
          <div class="preloader-count">0%</div>
        </div>
      </div>
      <!-- ==== / preloader end ==== -->
      <!-- ==== error section start ==== -->
      <section class="error">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-12 col-xl-7">
              <div class="error__content text-center">
                <div class="thumb">
                  <img src="assets/images/error.webp" alt="Image" />
                </div>
                <h3 class="title-animation">Page Not Found</h3>
                <p class="title-animation">
                  It could have been removed, renamed, or temporarily
                  unavailable. Try searching for what you're looking for.
                </p>
                <div class="cta mt-60">
                  <a
                    href="index.html"
                    aria-label="back to home"
                    title="back to home"
                    class="btn-primary"
                  >
                    <span class="btn-animated-text" data-text="Back To Home"
                      >Back To Home</span
                    >
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- ==== / error section end ==== -->
      <!-- ==== custom cursor start ==== -->
      <div class="mouseCursor cursor-outer"></div>
      <div class="mouseCursor cursor-inner">
        <span class="drag"> drag </span>
        <span class="view"> view </span>
        <span class="play"> play </span>
      </div>
      <!-- ==== / custom cursor end ==== -->
      <!-- ==== scroll to top start ==== -->
      <button
        class="progress-wrap"
        aria-label="scroll indicator"
        title="back to top"
      >
        <span></span>
        <svg
          class="progress-circle svg-content"
          width="100%"
          height="100%"
          viewBox="-1 -1 102 102"
        >
          <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98" />
        </svg>
      </button>
      <!-- ==== / scroll to top end ==== -->
    </div>
    <!-- ==== js dependencies start ==== -->
    <!-- jquery -->
    <script src="assets/js/jquery-4.0.0.min.js"></script>
    <!-- bootstrap five js -->
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <!-- nice select js -->
    <script src="assets/js/jquery.nice-select.min.js"></script>
    <!-- magnific popup js -->
    <script src="assets/js/jquery.magnific-popup.min.js"></script>
    <!-- swiper slider js -->
    <script src="assets/js/swiper-bundle.min.js"></script>
    <!-- viewport js -->
    <script src="assets/js/viewport.jquery.js"></script>
    <!-- odometer js -->
    <script src="assets/js/odometer.min.js"></script>
    <!-- vanilla tilt js -->
    <script src="assets/js/vanilla-tilt.min.js"></script>
    <!-- phospor icons js -->
    <script src="assets/js/phosphor-icon.js"></script>
    <!-- image loaded js -->
    <script src="assets/js/imagesloaded.pkgd.min.js"></script>
    <!-- isotope js -->
    <script src="assets/js/isotope.pkgd.min.js"></script>
    <!-- scrolltrigger js -->
    <script src="assets/js/ScrollTrigger.min.js"></script>
    <!-- splittext js -->
    <script src="assets/js/SplitText.min.js"></script>
    <!-- scrollto js -->
    <script src="assets/js/ScrollToPlugin.min.js"></script>
    <!-- lenis js -->
    <script src="assets/js/lenis.min.js"></script>
    <!-- gsap js -->
    <script src="assets/js/gsap.min.js"></script>
    <!-- three js -->
    <script src="assets/js/three.js"></script>
    <!-- hover effect js -->
    <script src="assets/js/hover-effect.umd.js"></script>
    <!-- ==== / js dependencies end ==== -->
    <!-- main js -->
    <script src="assets/js/main.js"></script>
  </body>
</html>
